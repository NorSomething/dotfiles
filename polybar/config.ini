[bar/main]
width = 100%
height = 24
background = #cc000000
foreground = #ffffff

font-0 = JetBrainsMono Nerd Font:size=10

modules-left = i3
modules-center = date
modules-right = cpu temperature memory battery

padding-left = 1
padding-right = 2
module-margin = 1

[module/i3]
type = internal/i3
format = <label-state>
label-focused = %index%
label-focused-foreground = #ffffff
label-unfocused = %index%
label-unfocused-foreground = #555555
label-separator = " "

[module/date]
type = internal/date
interval = 1
date = %H:%M

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
label = %percentage%%

[module/temperature]
type = internal/temperature
interval = 2
format-prefix = "TEMP "
label = %temperature-c%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
label = %gb_used%

[module/battery]
type = internal/battery
battery = BAT1
adapter = AC0
format-charging-prefix = "BAT "
format-discharging-prefix = "BAT "
label-charging = %percentage%%
label-discharging = %percentage%%
